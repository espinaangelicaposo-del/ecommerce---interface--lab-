<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Checkout</h1>

<section>
  <fieldset>
    <legend>Shipping Address</legend>
    <label>Name: <input type="text" required></label><br>
    <label>Street: <input type="text" required></label><br>
    <label>Zip Code: <input type="text" required></label>
  </fieldset>
</section>

<form>
  <h3>Payment Method</h3>
  <label><input type="radio" name="payment" required> Credit Card</label>
  <label><input type="radio" name="payment"> PayPal</label>
</form>

<aside>
  <h3>Order Summary</h3>
  <p>Wireless Headphones</p>
  <p>Total: <span class="price">500</span></p>
  <button>Place Order</button>
</aside>

</body>
</html>
